name: Docker Build and Push (Reusable)

on:
  workflow_call:
    inputs:
      context:
        description: "Dockerのビルドコンテキスト"
        type: string
        default: "."
      tags:
        description: "Dockerイメージのタグ (空の場合は ghcr.io/{repository}:latest を使用)"
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          push: true
          tags: ${{ inputs.tags != '' && inputs.tags || format('ghcr.io/{0}:latest', github.repository) }}
